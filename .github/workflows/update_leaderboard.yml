name: Update Mundial Leaderboard

on:
  # כל 15 דק' בשעות משחקים (UTC). מכסה 13:00-03:00 UTC = ~9AM-11PM ET.
  # football-data.org: 10 קריאות/דקה, ללא מגבלה יומית. מספיק בשפע.
  schedule:
    - cron: '*/15 0-3,13-23 * 6-7 *'   # יוני-יולי בלבד

  # הרצה ידנית (כפתור "Run workflow" ב-GitHub)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run leaderboard update
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py
