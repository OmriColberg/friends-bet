name: Update Mundial Leaderboard

on:
  # שעות שיא (כשרוב המשחקים): כל 5 דק'
  # 16:00-00:00 UTC = 19:00-03:00 ישראל
  # 04:00-06:30 UTC = 07:00-09:30 ישראל
  # שעות שקטות: כל 10 דק'
  # 00:00-04:00 UTC = 03:00-07:00 ישראל
  schedule:
    - cron: '*/5 16-23 * 6-7 *'
    - cron: '*/15 0-3 * 6-7 *'
    - cron: '*/5 4-6 * 6-7 *'

  # הרצה ידנית (כפתור "Run workflow" ב-GitHub)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run leaderboard update
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py
